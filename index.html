<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- Launch as a fullscreen web-app from the Home Screen (no address bar on iPhone) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dark Energy">
    <meta name="theme-color" content="#000000">
    <title>Dark Energy</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0;
            width: 100%;
            height: 100vh; height: 100dvh;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #wrap {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        /* Held in portrait? Rotate the game into landscape to fill the whole screen */
        @media (orientation: portrait) {
            #wrap {
                top: 50%; left: 50%;
                width: 100vh;  height: 100vw;
                width: 100dvh; height: 100dvw;
                transform: translate(-50%, -50%) rotate(90deg);
                transform-origin: center center;
            }
        }
        #gameCanvas {
            display: block;
            width: auto; height: auto;
            max-width: 100%; max-height: 100%;
            background: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        /* CRT scanline overlay for the 80s arcade look */
        #crt {
            position: fixed; inset: 0; pointer-events: none; z-index: 9999;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 3px);
            mix-blend-mode: multiply;
        }
        #controls {
            position: absolute; left: 0; right: 0; bottom: 0;
            display: flex; justify-content: space-between;
            padding: 8px max(12px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
            pointer-events: none;
        }
        #left-cluster, #right-cluster { display: flex; gap: 9px; pointer-events: none; }
        .btn {
            width: 46px; height: 46px;
            background: rgba(20,20,30,0.6);
            border: 2px solid #39ff14; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 21px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 6px #39ff14; touch-action: none;
            color: #fff;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        #btn-kick  { border-color: #ff5722; box-shadow: 0 0 6px #ff5722; }
        #btn-shoot { border-color: #00e5ff; box-shadow: 0 0 6px #00e5ff; display: none; }
        #btn-eat   { border-color: #ffd700; box-shadow: 0 0 6px #ffd700; }
    </style>
</head>
<body>
<div id="wrap">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div id="controls">
        <div id="left-cluster">
            <div class="btn" id="btn-back">⬅️</div>
            <div class="btn" id="btn-move">➡️</div>
        </div>
        <div id="right-cluster">
            <div class="btn" id="btn-eat">🍔</div>
            <div class="btn" id="btn-shoot">🦴</div>
            <div class="btn" id="btn-kick">🦵</div>
        </div>
    </div>
</div>
<div id="crt"></div>

<script>
"use strict";
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

// ================= WORLD =================
const GROUND_Y = 380;
const WORLD_END = 7200;
const BOSS_GATE_X = 6500;

const ZONES = [
    { name: "city",   end: 1700 },
    { name: "forest", end: 3300 },
    { name: "lab",    end: 4900 },
    { name: "cave",   end: WORLD_END }
];
function zoneAt(x){ for (const z of ZONES) if (x < z.end) return z.name; return "cave"; }

// 80s neon palette
const NEON = { green:"#39ff14", magenta:"#ff00ff", cyan:"#00e5ff", yellow:"#ffe600", pink:"#ff2f6e", purple:"#b060ff" };
const FONT = "'Courier New', monospace";

// ================= SOUND (retro 8-bit via WebAudio) =================
let actx = null;
function audioInit(){
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
    if (actx && actx.state === "suspended") actx.resume();
}
function beep(freq, dur, type, vol, slideTo){
    if (!actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "square";
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(vol || 0.15, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + dur);
}
const SFX = {
    start(){ beep(330,0.08,"square",0.2); setTimeout(()=>beep(660,0.15,"square",0.2),90); },
    step(){ beep(110,0.04,"square",0.05); },
    kick(){ beep(220,0.12,"square",0.2,70); },
    bone(){ beep(500,0.1,"square",0.15,950); },
    potion(){ beep(700,0.12,"triangle",0.15,1300); },
    pickup(){ beep(600,0.06,"square",0.18); setTimeout(()=>beep(900,0.08,"square",0.18),60); },
    ammo(){ beep(400,0.06,"square",0.18); setTimeout(()=>beep(520,0.09,"square",0.18),55); },
    heal(){ beep(500,0.1,"triangle",0.18,820); },
    hurt(){ beep(170,0.18,"sawtooth",0.2,60); },
    down(){ beep(420,0.12,"square",0.18,120); },
    wee(){ beep(300,0.35,"sine",0.22,1600); },
    bossHit(){ beep(150,0.1,"square",0.18,90); },
    bossAppear(){ beep(80,0.5,"sawtooth",0.22,180); },
    win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,"square",0.2),i*140)); },
    lose(){ [400,300,200,120].forEach((f,i)=>setTimeout(()=>beep(f,0.25,"sawtooth",0.2),i*160)); }
};
["pointerdown","keydown","touchstart"].forEach(ev => window.addEventListener(ev, audioInit));

// ================= STATE =================
let gameState = "start"; // start | play | dead | win
let cameraX = 0;
let tick = 0;

const player = {
    x: 100, y: GROUND_Y - 80, w: 40, h: 80,
    facing: 1,
    hp: 100, maxHp: 100,
    isKicking: false, kickTimer: 0,
    shootCd: 0, hurtCd: 0,
    inv: { burger: 0, apple: 0 },   // healing food
    ammo: { bone: 0, potion: 0 }    // thrown weapons
};

let cans = [], apples = [], chests = [], enemies = [], items = [];
let shots = [], bossShots = [], popups = [];
let boss = null;

// ================= LEVEL BUILD =================
function buildWorld() {
    cans = []; apples = []; chests = []; enemies = []; items = [];
    shots = []; bossShots = []; popups = []; boss = null;

    // City: trash cans with raccoons and burgers
    [500, 800, 1150, 1450].forEach((x, i) => {
        cans.push({ x, y: GROUND_Y - 60, w: 50, h: 60,
            kicked: false, shake: 0, hasRaccoon: i % 2 === 0, hasBurger: true });
    });

    // Forest: apples guarded by squirrels
    [2000, 2350, 2700, 3050].forEach(x => {
        apples.push({ x, y: GROUND_Y - 18, w: 26, h: 18, taken: false, gone: false });
        enemies.push(makeEnemy("squirrel", x + 40, GROUND_Y - 34));
    });

    // Lab: zombies (drop potions when killed)
    [3700, 3950, 4200, 4500, 4750].forEach(x => enemies.push(makeEnemy("zombie", x, GROUND_Y - 78)));

    // Cave/Castle: tentacles + chests (give bones + skeletons)
    [5100, 5350, 5600, 5900, 6150, 6350].forEach(x => enemies.push(makeEnemy("tentacle", x, GROUND_Y)));
    [5250, 5800, 6250].forEach(x => chests.push({ x, y: GROUND_Y - 40, w: 46, h: 40, opened: false }));
}

function makeEnemy(type, x, y) {
    const base = { type, x, y, vx: 0, vy: 0, alive: true, state: "idle", biteCd: 0, hitFlash: 0 };
    if (type === "raccoon")  return Object.assign(base, { w: 40, h: 34, hp: 1 });
    if (type === "squirrel") return Object.assign(base, { w: 30, h: 30, hp: 1, state: "guard" });
    if (type === "zombie")   return Object.assign(base, { w: 46, h: 78, hp: 2, state: "walk" });
    if (type === "tentacle") return Object.assign(base, { w: 40, h: 90, hp: 2, state: "hidden", h0: 0 });
    if (type === "skeleton") return Object.assign(base, { w: 36, h: 60, hp: 1, state: "chase" });
    return base;
}

// ================= INPUT =================
let moveRight = false, moveLeft = false;
const $ = id => document.getElementById(id);
const btnMove = $("btn-move"), btnBack = $("btn-back"),
      btnKick = $("btn-kick"), btnShoot = $("btn-shoot"), btnEat = $("btn-eat");

function holdButton(el, onDown, onUp) {
    el.addEventListener("mousedown", e => { e.preventDefault(); onDown(); });
    el.addEventListener("mouseup", onUp);
    el.addEventListener("mouseleave", onUp);
    el.addEventListener("touchstart", e => { e.preventDefault(); onDown(); }, { passive: false });
    el.addEventListener("touchend", e => { e.preventDefault(); onUp(); }, { passive: false });
    el.addEventListener("touchcancel", onUp);
}
function tapButton(el, fn) {
    el.addEventListener("mousedown", e => { e.preventDefault(); fn(); });
    el.addEventListener("touchstart", e => { e.preventDefault(); fn(); }, { passive: false });
}

holdButton(btnMove, () => { moveRight = true;  player.facing = 1;  }, () => moveRight = false);
holdButton(btnBack, () => { moveLeft = true;   player.facing = -1; }, () => moveLeft = false);
tapButton(btnKick, doKick);
tapButton(btnShoot, doShoot);
tapButton(btnEat, doEat);

canvas.addEventListener("mousedown", handleTap);
canvas.addEventListener("touchstart", e => { e.preventDefault(); handleTap(); }, { passive: false });
function handleTap() {
    if (gameState === "start" || gameState === "dead" || gameState === "win") startGame();
}

window.addEventListener("keydown", e => {
    if (e.code === "ArrowRight" || e.code === "KeyD") { moveRight = true; player.facing = 1; }
    if (e.code === "ArrowLeft"  || e.code === "KeyA") { moveLeft = true;  player.facing = -1; }
    if (e.code === "Space") { e.preventDefault(); if (gameState === "play") doKick(); else handleTap(); }
    if (e.code === "KeyF") { e.preventDefault(); doShoot(); }
    if (e.code === "KeyE") { e.preventDefault(); doEat(); }
});
window.addEventListener("keyup", e => {
    if (e.code === "ArrowRight" || e.code === "KeyD") moveRight = false;
    if (e.code === "ArrowLeft"  || e.code === "KeyA") moveLeft = false;
});

// ================= ACTIONS =================
function startGame() {
    audioInit();
    Object.assign(player, {
        x: 100, y: GROUND_Y - 80, facing: 1, hp: 100,
        isKicking: false, kickTimer: 0, shootCd: 0, hurtCd: 0,
        inv: { burger: 0, apple: 0 }, ammo: { bone: 0, potion: 0 }
    });
    moveRight = moveLeft = false;
    cameraX = 0; tick = 0;
    updateShootBtn();
    buildWorld();
    gameState = "play";
    SFX.start();
}

function updateShootBtn() {
    btnShoot.style.display = (player.ammo.bone + player.ammo.potion > 0) ? "flex" : "none";
}

function doKick() {
    if (gameState !== "play" || player.isKicking) return;
    player.isKicking = true; player.kickTimer = 14;
    SFX.kick();

    const range = 34;
    const kx = player.facing === 1 ? player.x + player.w : player.x - range;
    const hb = { x: kx, y: player.y + 20, w: range, h: player.h - 20 };

    for (const c of cans) if (aabb(hb, c)) kickCan(c);
    for (const ch of chests) if (!ch.opened && aabb(hb, ch)) openChest(ch);
    for (const e of enemies) if (e.alive && aabb(hb, e)) kickEnemy(e);
}

function kickCan(c) {
    c.shake = 18;
    if (c.kicked) return;
    c.kicked = true;
    if (c.hasRaccoon) {
        const r = makeEnemy("raccoon", c.x + 4, c.y - 8);
        r.state = "chase"; r.vy = -6;
        enemies.push(r);
        popup(c.x, c.y - 30, "!", "#fff");
    } else if (c.hasBurger) {
        dropItem("burger", c.x - 30, c.y - 10);
        c.hasBurger = false;
    }
}

function openChest(ch) {
    ch.opened = true;
    player.ammo.bone += 5;   // bones and potions come in equal amounts (+5 each)
    updateShootBtn();
    popup(ch.x, ch.y - 20, "+5 BONES", NEON.cyan);
    SFX.ammo();
}

function kickEnemy(e) {
    e.hitFlash = 8;
    if (e.type === "raccoon") {
        e.alive = false; SFX.down();
        popup(e.x, e.y - 20, "★", NEON.yellow);
        dropItem("burger", e.x, e.y - 10);
    } else if (e.type === "squirrel") {
        e.alive = false; SFX.wee();
        popup(e.x, e.y - 30, "WHEEE!", NEON.pink);
    } else if (e.type === "skeleton") {
        e.alive = false; SFX.down();
        popup(e.x, e.y - 20, "★", "#ddd");
    } else if (e.type === "zombie" || e.type === "tentacle") {
        e.hp -= 1; e.vx = player.facing * 3;
        if (e.hp <= 0) {
            e.alive = false; SFX.down();
            if (e.type === "zombie") dropItem("potion", e.x, e.y);
        }
    }
}

function doShoot() {
    if (gameState !== "play") return;
    let kind = null;
    if (player.ammo.bone > 0) kind = "bone";
    else if (player.ammo.potion > 0) kind = "potion";   // potions thrown after bones run out
    if (!kind || player.shootCd > 0) return;
    player.shootCd = 16;
    player.ammo[kind]--;
    shots.push({ x: player.x + player.w/2, y: player.y + 28, w: 18, h: 12,
                 vx: player.facing * 10, kind, spin: 0 });
    (kind === "bone") ? SFX.bone() : SFX.potion();
    updateShootBtn();
}

function doEat() {
    if (gameState !== "play" || player.hp >= player.maxHp) return;
    let food = null;
    if (player.inv.burger > 0) food = "burger";
    else if (player.inv.apple > 0) food = "apple";
    if (!food) return;
    player.inv[food]--;
    player.hp = Math.min(player.maxHp, player.hp + 30);
    popup(player.x + 10, player.y - 10, "+30", NEON.green);
    SFX.heal();
}

// ================= HELPERS =================
function aabb(a, b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
function dropItem(type, x, y){
    const w = (type === "potion") ? 18 : (type === "burger" ? 30 : 26);
    const h = (type === "potion") ? 24 : 20;
    items.push({ type, x, y, w, h, vy: -3 });
}
function popup(x, y, text, color){ popups.push({ x, y, text, color, life: 50 }); }
function hurt(dmg){
    if (player.hurtCd > 0) return;
    player.hp -= dmg; player.hurtCd = 40;
    popup(player.x + 10, player.y - 10, "-" + dmg, NEON.pink);
    SFX.hurt();
    if (player.hp <= 0) { player.hp = 0; gameState = "dead"; SFX.lose(); }
}

// ================= UPDATE =================
function update() {
    if (gameState !== "play") return;
    tick++;

    let dx = 0;
    if (moveRight) dx += 4;
    if (moveLeft)  dx -= 4;
    player.x = Math.max(0, Math.min(player.x + dx, WORLD_END - player.w));
    if (dx !== 0 && tick % 16 === 0) SFX.step();

    if (player.isKicking && --player.kickTimer <= 0) player.isKicking = false;
    if (player.shootCd > 0) player.shootCd--;
    if (player.hurtCd > 0) player.hurtCd--;

    cameraX = Math.max(0, Math.min(player.x - W/2 + player.w/2, WORLD_END - W));
    if (player.x >= BOSS_GATE_X) cameraX = Math.min(cameraX, BOSS_GATE_X - W/2 + 200);

    if (player.x >= BOSS_GATE_X - 100 && !boss) spawnBoss();

    for (const c of cans) if (c.shake > 0) c.shake--;
    updateItems(); updateApples(); updateEnemies(); updateShots(); updateBoss(); updatePopups();
}

function updateItems() {
    for (const it of items) {
        it.vy += 0.5; it.y += it.vy;
        const rest = GROUND_Y - it.h;
        if (it.y > rest) { it.y = rest; it.vy = 0; }
        if (aabb(player, it)) {
            if (it.type === "potion") { player.ammo.potion += 5; updateShootBtn(); popup(player.x, player.y-20, "+5 POTION", NEON.magenta); SFX.ammo(); }
            else { player.inv[it.type]++; popup(player.x, player.y-20, "+1", "#fff"); SFX.pickup(); }
            it.dead = true;
        }
    }
    items = items.filter(it => !it.dead);
}

function updateApples() {
    for (const a of apples) {
        if (a.taken || a.gone) continue;
        const guard = enemies.find(e => e.type === "squirrel" && e.alive && Math.abs(e.x - a.x) < 60);
        if (guard && Math.abs(player.x - a.x) < 70) continue; // squirrel still guarding
        if (aabb(player, a)) {
            a.taken = true; a.gone = true;
            player.inv.apple++;
            popup(a.x, a.y - 20, "+APPLE", "#ff5555");
            SFX.pickup();
        }
    }
}

function updateEnemies() {
    for (const e of enemies) {
        if (!e.alive) continue;
        if (e.hitFlash > 0) e.hitFlash--;
        if (e.biteCd > 0) e.biteCd--;

        if (e.type === "raccoon" || e.type === "skeleton") {
            e.vy += 0.5; e.y += e.vy; e.x += e.vx;
            const floor = GROUND_Y - e.h;
            if (e.y > floor) { e.y = floor; e.vy = 0; e.vx *= 0.8; }
        }
        const dist = player.x - e.x;

        if (e.type === "raccoon" || e.type === "skeleton") {
            if (Math.abs(dist) > 4) e.x += Math.sign(dist) * 1.6;
            if (aabb(player, e) && e.biteCd <= 0) { hurt(8); e.biteCd = 45; }
        } else if (e.type === "squirrel") {
            e.y = GROUND_Y - 30 + Math.sin(tick*0.2 + e.x)*2;
        } else if (e.type === "zombie") {
            if (Math.abs(dist) < 360 && Math.abs(dist) > 4) e.x += Math.sign(dist) * 0.8;
            e.vx *= 0.8; e.x += e.vx;
            if (aabb(player, e) && e.biteCd <= 0) { hurt(12); e.biteCd = 50; }
        } else if (e.type === "tentacle") {
            const near = Math.abs(dist) < 90;
            e.h0 = e.h0 || 0;
            e.h0 += ((near ? e.h : 0) - e.h0) * 0.15;
            e.vx *= 0.8; e.x += e.vx;
            const hitbox = { x: e.x, y: GROUND_Y - e.h0, w: e.w, h: e.h0 };
            if (e.h0 > 30 && aabb(player, hitbox) && e.biteCd <= 0) { hurt(14); e.biteCd = 55; }
        }
    }
    enemies = enemies.filter(e => e.alive);
}

function updateShots() {
    for (const s of shots) {
        s.x += s.vx; s.spin += 0.4;
        if (s.x < cameraX - 60 || s.x > cameraX + W + 60) s.dead = true;
        for (const e of enemies) {
            if (!e.alive) continue;
            let box = e;
            if (e.type === "tentacle") box = { x: e.x, y: GROUND_Y - (e.h0||0), w: e.w, h: e.h0||0 };
            if (aabb(s, box)) {
                e.hp -= 1; e.hitFlash = 8; s.dead = true;
                if (e.hp <= 0) {
                    e.alive = false; SFX.down();
                    if (e.type === "zombie") dropItem("potion", e.x, e.y);
                }
            }
        }
        if (boss && boss.alive && aabb(s, boss)) {
            boss.hp -= 1; boss.hitFlash = 8; s.dead = true; SFX.bossHit();
            if (boss.hp <= 0) bossPhaseEnd();
        }
    }
    shots = shots.filter(s => !s.dead);
}

// ================= BOSS =================
function spawnBoss() {
    boss = { x: BOSS_GATE_X + 340, y: GROUND_Y - 150, w: 120, h: 130,
             hp: 8, maxHp: 8, stage: 1, alive: true, hitFlash: 0, t: 0, atkCd: 90 };
    popup(BOSS_GATE_X + 200, 120, "MISHA", NEON.purple);
    SFX.bossAppear();
}
function bossPhaseEnd() {
    if (boss.stage === 1) {
        boss.stage = 2;
        boss.w = 200; boss.h = 210; boss.y = GROUND_Y - 230;
        boss.maxHp = 12; boss.hp = 12; boss.atkCd = 60; boss.hitFlash = 20;
        popup(boss.x - 40, boss.y - 30, "I'M BACK!", NEON.pink);
        SFX.bossAppear();
    } else {
        boss.alive = false; bossShots = [];
        gameState = "win"; SFX.win();
    }
}
function updateBoss() {
    if (!boss || !boss.alive) return;
    boss.t++;
    if (boss.hitFlash > 0) boss.hitFlash--;
    boss.y = (GROUND_Y - (boss.stage === 1 ? 150 : 230)) + Math.sin(boss.t * 0.05) * 20;

    if (--boss.atkCd <= 0) {
        boss.atkCd = boss.stage === 1 ? 90 : 55;
        const cx = boss.x + boss.w/2, cy = boss.y + boss.h/2;
        const dx = (player.x + player.w/2) - cx, dy = (player.y + player.h/2) - cy;
        const d = Math.hypot(dx, dy) || 1;
        const sp = boss.stage === 1 ? 4 : 6;
        bossShots.push({ x: cx, y: cy, w: 18, h: 18, vx: dx/d*sp, vy: dy/d*sp });
        if (boss.stage === 2) {
            bossShots.push({ x: cx, y: cy, w: 18, h: 18, vx: dx/d*sp - 1.5, vy: dy/d*sp - 1.5 });
            bossShots.push({ x: cx, y: cy, w: 18, h: 18, vx: dx/d*sp + 1.5, vy: dy/d*sp + 1.5 });
        }
    }
    for (const b of bossShots) {
        b.x += b.vx; b.y += b.vy;
        if (b.x < cameraX - 60 || b.x > cameraX + W + 60 || b.y > H + 40) b.dead = true;
        if (aabb(player, b)) { hurt(boss.stage === 1 ? 10 : 15); b.dead = true; }
    }
    bossShots = bossShots.filter(b => !b.dead);
}

function updatePopups() {
    for (const p of popups) { p.y -= 0.7; p.life--; }
    popups = popups.filter(p => p.life > 0);
}

// ================= DRAW =================
function draw() {
    drawBackground();
    if (gameState === "start") { drawStart(); drawScanlines(); return; }

    ctx.save();
    ctx.translate(-cameraX, 0);
    drawZoneDecor();
    for (const c of cans) drawCan(c);
    for (const a of apples) drawApple(a);
    for (const ch of chests) drawChest(ch);
    for (const it of items) drawItem(it);
    for (const e of enemies) drawEnemy(e);
    for (const s of shots) drawShot(s);
    if (boss) drawBoss();
    for (const b of bossShots) drawBossShot(b);
    drawPlayer();
    for (const p of popups) drawPopup(p);
    ctx.restore();

    drawHUD();
    if (gameState === "dead") drawEnd("GAME OVER", NEON.pink);
    if (gameState === "win")  drawEnd("YOU WIN!", NEON.green);
    drawScanlines();
}

function drawBackground() {
    const z = gameState === "start" ? "city" : zoneAt(cameraX + W/2);
    let sky1, sky2, ground;
    if (z === "city")        { sky1 = "#1a1a4e"; sky2 = "#3b2a80"; ground = "#20143a"; }
    else if (z === "forest") { sky1 = "#06231a"; sky2 = "#0f4030"; ground = "#0a2418"; }
    else if (z === "lab")    { sky1 = "#12122b"; sky2 = "#241a44"; ground = "#161628"; }
    else                     { sky1 = "#05000a"; sky2 = "#160828"; ground = "#0d0616"; }
    const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    g.addColorStop(0, sky1); g.addColorStop(1, sky2);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, GROUND_Y);
    ctx.fillStyle = ground; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    // neon horizon line (retro grid vibe)
    ctx.strokeStyle = NEON.magenta; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
    ctx.globalAlpha = 1;
}

function drawScanlines() {
    ctx.save();
    ctx.globalAlpha = 0.10; ctx.fillStyle = "#000";
    for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
    ctx.restore();
}

function drawZoneDecor() {
    // City: neon buildings
    for (let x = 0; x < ZONES[0].end; x += 220) {
        const h = 120 + ((x*37) % 90);
        ctx.fillStyle = "#241a4a"; ctx.fillRect(x + 40, GROUND_Y - h, 140, h);
        ctx.fillStyle = NEON.cyan;
        for (let wy = GROUND_Y - h + 20; wy < GROUND_Y - 20; wy += 40)
            for (let wx = x + 60; wx < x + 160; wx += 40)
                ctx.fillRect(wx, wy, 16, 22);
    }
    drawGate(ZONES[0].end - 30);
    // Forest: trees
    for (let x = ZONES[0].end; x < ZONES[1].end; x += 160) {
        ctx.fillStyle = "#3a2510"; ctx.fillRect(x + 60, GROUND_Y - 120, 24, 120);
        ctx.fillStyle = "#12592f"; ctx.beginPath();
        ctx.arc(x + 72, GROUND_Y - 130, 55, 0, Math.PI*2); ctx.fill();
    }
    // Lab: walls with neon strips
    for (let x = ZONES[1].end; x < ZONES[2].end; x += 200) {
        ctx.fillStyle = "#20243f"; ctx.fillRect(x + 30, GROUND_Y - 200, 160, 200);
        ctx.fillStyle = NEON.cyan; ctx.globalAlpha = 0.5;
        ctx.fillRect(x + 50, GROUND_Y - 160, 120, 3);
        ctx.fillRect(x + 50, GROUND_Y - 90, 120, 3);
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#0d1120"; ctx.fillRect(x + 90, GROUND_Y - 110, 40, 110);
    }
    // Cave: stalactites + bones
    for (let x = ZONES[2].end; x < ZONES[3].end; x += 120) {
        ctx.fillStyle = "#1a1026";
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + 40, 0); ctx.lineTo(x + 20, 70); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#8a8474"; ctx.fillRect(x + 30, GROUND_Y + 20, 26, 5);
    }
    // Starfield across the cave / boss arena
    for (let i = 0; i < 140; i++) {
        const sx = ZONES[2].end + (i * 213) % (ZONES[3].end - ZONES[2].end);
        const sy = ((i * 97) % 320) + 8;
        ctx.fillStyle = (i % 4 === 0) ? "rgba(180,240,255,0.9)" : "rgba(120,230,220,0.55)";
        const ss = (i % 6 === 0) ? 2 : 1;
        ctx.fillRect(sx, sy, ss, ss);
    }
    // Black castle
    ctx.fillStyle = "#0d0618"; ctx.fillRect(BOSS_GATE_X - 200, GROUND_Y - 260, 700, 260);
    ctx.fillStyle = "#070312";
    for (let i = 0; i < 5; i++) ctx.fillRect(BOSS_GATE_X - 200 + i*160, GROUND_Y - 300, 60, 60);
}
function drawGate(x) {
    ctx.fillStyle = "#333"; ctx.fillRect(x, GROUND_Y - 150, 16, 150);
    ctx.fillRect(x + 60, GROUND_Y - 150, 16, 150);
    ctx.fillRect(x - 6, GROUND_Y - 160, 90, 16);
}

function drawCan(c) {
    const dx = c.shake > 0 ? Math.sin(c.shake * 1.6) * 4 : 0;
    ctx.fillStyle = "#5a6673"; ctx.fillRect(c.x + dx, c.y, c.w, c.h);
    ctx.fillStyle = "#454f5a";
    for (let i = 1; i < 4; i++) ctx.fillRect(c.x + dx, c.y + i*15, c.w, 3);
    ctx.fillStyle = c.kicked ? "#333" : "#444";
    const lidY = c.kicked ? c.y - 16 : c.y - 5;
    ctx.fillRect(c.x - 4 + dx, lidY, c.w + 8, 8);
}
function drawApple(a) {
    if (a.taken || a.gone) return;
    ctx.fillStyle = "#e83030"; ctx.beginPath();
    ctx.arc(a.x + a.w/2, a.y + a.h/2, a.w/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#3a2510"; ctx.fillRect(a.x + a.w/2 - 1, a.y - 4, 3, 6);
    ctx.fillStyle = "#3fae50"; ctx.fillRect(a.x + a.w/2 + 2, a.y - 3, 6, 3);
}
function drawChest(ch) {
    ctx.fillStyle = ch.opened ? "#5a3a1a" : "#8a5a2a"; ctx.fillRect(ch.x, ch.y, ch.w, ch.h);
    ctx.fillStyle = NEON.yellow; ctx.fillRect(ch.x, ch.y + ch.h/2 - 3, ch.w, 6);
    if (!ch.opened) ctx.fillRect(ch.x + ch.w/2 - 4, ch.y + ch.h/2 - 6, 8, 12);
    ctx.strokeStyle = "#000"; ctx.strokeRect(ch.x, ch.y, ch.w, ch.h);
}
function drawItem(it) {
    if (it.type === "burger") {
        ctx.fillStyle = "#DEB887"; ctx.fillRect(it.x, it.y, it.w, 6);
        ctx.fillStyle = "#8b5a2b"; ctx.fillRect(it.x, it.y + 6, it.w, 6);
        ctx.fillStyle = "#6cbf3f"; ctx.fillRect(it.x, it.y + 12, it.w, 3);
        ctx.fillStyle = "#DEB887"; ctx.fillRect(it.x, it.y + 15, it.w, 5);
    } else if (it.type === "potion") {
        ctx.fillStyle = "#888"; ctx.fillRect(it.x + it.w/2 - 3, it.y, 6, 6);         // cork
        ctx.fillStyle = NEON.magenta; ctx.fillRect(it.x + 2, it.y + 6, it.w - 4, it.h - 6); // liquid
        ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fillRect(it.x + 4, it.y + 8, 3, it.h - 12);
    } else if (it.type === "apple") {
        ctx.fillStyle = "#e83030"; ctx.beginPath();
        ctx.arc(it.x + it.w/2, it.y + it.h/2, it.w/2, 0, Math.PI*2); ctx.fill();
    }
}

function drawEnemy(e) {
    ctx.save();
    if (e.hitFlash > 0 && Math.floor(e.hitFlash/2)%2 === 0) ctx.globalAlpha = 0.4;
    if (e.type === "raccoon") {
        ctx.fillStyle = "#555"; ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = "#222"; ctx.fillRect(e.x + 6, e.y + 6, 10, 8); ctx.fillRect(e.x + e.w - 16, e.y + 6, 10, 8);
        ctx.fillStyle = "#fff"; ctx.fillRect(e.x + 8, e.y + 8, 3, 3); ctx.fillRect(e.x + e.w - 12, e.y + 8, 3, 3);
        ctx.fillStyle = "#333"; for (let i=0;i<3;i++) ctx.fillRect(e.x - 8, e.y + 4 + i*8, 8, 4);
    } else if (e.type === "squirrel") {
        ctx.fillStyle = "#a0522d"; ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = "#8b4513"; ctx.beginPath(); ctx.arc(e.x - 4, e.y + 4, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000"; ctx.fillRect(e.x + e.w - 12, e.y + 6, 4, 4);
    } else if (e.type === "zombie") {
        ctx.fillStyle = "#4a7a3a"; ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = "#2f4f2f"; ctx.fillRect(e.x, e.y + 30, e.w, 6);
        ctx.fillStyle = "#c00"; ctx.fillRect(e.x + 8, e.y + 12, 8, 6); ctx.fillRect(e.x + e.w - 16, e.y + 12, 8, 6);
        ctx.fillStyle = "#000"; ctx.fillRect(e.x, e.y - 8, e.w, 4);
        ctx.fillStyle = NEON.green; ctx.fillRect(e.x, e.y - 8, e.w * (e.hp/2), 4);
    } else if (e.type === "tentacle") {
        const hh = e.h0 || 0, bx = e.x, by = GROUND_Y - hh;
        ctx.fillStyle = "#2b3fbf"; ctx.fillRect(bx, by, e.w, hh);
        // smooth rounded tip (no suckers/eyes)
        if (hh > 8) { ctx.fillStyle = "#4256d8"; ctx.beginPath(); ctx.arc(bx + e.w/2, by + 4, e.w/2, Math.PI, Math.PI*2); ctx.closePath(); ctx.fill(); }
    } else if (e.type === "skeleton") {
        ctx.fillStyle = "#e8e8e0"; ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = "#000"; ctx.fillRect(e.x + 6, e.y + 6, 6, 6); ctx.fillRect(e.x + e.w - 12, e.y + 6, 6, 6);
        ctx.fillRect(e.x + 6, e.y + 20, e.w - 12, 3);
    }
    ctx.restore();
}

function drawShot(s) {
    ctx.save();
    ctx.translate(s.x + s.w/2, s.y + s.h/2);
    ctx.rotate(s.spin);
    if (s.kind === "bone") {
        ctx.fillStyle = "#f5f2e6";
        ctx.fillRect(-s.w/2 + 3, -2, s.w - 6, 4);          // shaft
        ctx.beginPath(); ctx.arc(-s.w/2 + 3, -3, 3, 0, Math.PI*2); ctx.arc(-s.w/2 + 3, 3, 3, 0, Math.PI*2);
        ctx.arc(s.w/2 - 3, -3, 3, 0, Math.PI*2); ctx.arc(s.w/2 - 3, 3, 3, 0, Math.PI*2); ctx.fill();
    } else {
        ctx.fillStyle = "#888"; ctx.fillRect(-2, -s.h/2, 4, 4);
        ctx.fillStyle = NEON.magenta; ctx.fillRect(-s.w/2 + 3, -s.h/2 + 4, s.w - 6, s.h - 4);
    }
    ctx.restore();
}
function drawBossShot(b) {
    ctx.fillStyle = NEON.purple;
    ctx.beginPath(); ctx.arc(b.x + b.w/2, b.y + b.h/2, b.w/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#e0b0ff";
    ctx.beginPath(); ctx.arc(b.x + b.w/2, b.y + b.h/2, b.w/4, 0, Math.PI*2); ctx.fill();
}

function drawBoss() {
    if (!boss.alive) return;
    const cx = boss.x + boss.w/2, cy = boss.y + boss.h/2, r = boss.w/2;
    ctx.save();
    if (boss.hitFlash > 0 && Math.floor(boss.hitFlash/2)%2 === 0) ctx.globalAlpha = 0.5;
    // --- Dark Energy boss (styled after the reference art) ---
    // Pink/purple halo rings behind the body
    ctx.lineWidth = 6;
    ctx.strokeStyle = "rgba(255,60,150,0.5)";
    ctx.beginPath(); ctx.ellipse(cx, cy, r*1.5, r*1.12, 0, 0.2, Math.PI*2 - 0.2); ctx.stroke();
    ctx.strokeStyle = "rgba(160,60,255,0.4)";
    ctx.beginPath(); ctx.ellipse(cx, cy, r*1.72, r*1.28, 0, 0.6, Math.PI - 0.2); ctx.stroke();

    // Blue tentacles with teal tips, gently swaying
    const tent = [{a:-2.5,l:1.9},{a:-0.5,l:2.1},{a:0.6,l:1.8},{a:2.4,l:2.0},{a:3.3,l:1.6}];
    ctx.lineCap = "round";
    for (const t of tent) {
        const a1 = t.a + Math.sin(boss.t*0.06 + t.a) * 0.35;
        const x0 = cx + Math.cos(a1)*r*0.7,   y0 = cy + Math.sin(a1)*r*0.7;
        const x1 = cx + Math.cos(a1)*r*t.l,   y1 = cy + Math.sin(a1)*r*t.l;
        const bend = Math.sin(boss.t*0.05 + t.a) * r*0.6;
        const mx = (x0+x1)/2 + Math.cos(a1+1.57)*bend, my = (y0+y1)/2 + Math.sin(a1+1.57)*bend;
        ctx.strokeStyle = "#4a90d8"; ctx.lineWidth = r*0.28;
        ctx.beginPath(); ctx.moveTo(x0,y0); ctx.quadraticCurveTo(mx,my,x1,y1); ctx.stroke();
        ctx.strokeStyle = "#7fe6d6"; ctx.lineWidth = r*0.22;   // teal tip
        ctx.beginPath(); ctx.moveTo(x1 - Math.cos(a1)*r*0.32, y1 - Math.sin(a1)*r*0.32); ctx.lineTo(x1,y1); ctx.stroke();
    }

    // Purple blobby body
    const grad = ctx.createRadialGradient(cx - r*0.2, cy - r*0.2, r*0.2, cx, cy, r*1.05);
    grad.addColorStop(0, "#8a3ec8"); grad.addColorStop(0.6, "#5a1e9a"); grad.addColorStop(1, "#2a0a4a");
    ctx.fillStyle = grad;
    ctx.beginPath();
    for (let a = 0; a < Math.PI*2; a += 0.35) {
        const rr = r + Math.sin(a*3 + boss.t*0.1)*(r*0.14) + Math.cos(a*5)*(r*0.06);
        const px = cx + Math.cos(a)*rr, py = cy + Math.sin(a)*rr;
        a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    // darker lobes for depth
    ctx.fillStyle = "rgba(30,8,58,0.5)";
    ctx.beginPath(); ctx.arc(cx - r*0.4, cy + r*0.4, r*0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + r*0.45, cy - r*0.35, r*0.24, 0, Math.PI*2); ctx.fill();

    // One big glowing eye with a vertical slit pupil
    const eyeR = r*0.5;
    ctx.fillStyle = "#12082a"; ctx.beginPath(); ctx.arc(cx, cy, eyeR + 3, 0, Math.PI*2); ctx.fill();
    const eg = ctx.createRadialGradient(cx, cy, 2, cx, cy, eyeR);
    eg.addColorStop(0, "#ffd6d6"); eg.addColorStop(0.4, "#ff5a7a"); eg.addColorStop(1, "#c02a5a");
    ctx.shadowColor = NEON.pink; ctx.shadowBlur = 20;
    ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(cx, cy, eyeR, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#1a0510";
    ctx.beginPath(); ctx.ellipse(cx, cy, eyeR*0.16, eyeR*0.72, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.beginPath(); ctx.arc(cx + eyeR*0.32, cy + eyeR*0.12, eyeR*0.16, 0, Math.PI*2); ctx.fill();

    // Small metal helmet on top (kept from the earlier "Gumball helmet" request)
    const hy = cy - r*0.82;
    ctx.fillStyle = "#b8b8c2"; ctx.beginPath(); ctx.arc(cx, hy, r*0.5, Math.PI, Math.PI*2); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#9a9aa6"; ctx.fillRect(cx - r*0.56, hy - 3, r*1.12, 5);
    ctx.fillStyle = "#6f6f7a"; for (let i = -1; i <= 1; i++) ctx.fillRect(cx + i*r*0.2 - 2, hy - r*0.24, 3, 3);
    ctx.restore();

    // Boss HP bar (screen space)
    const bw = 300, bx = cameraX + W/2 - bw/2, by = 30;
    ctx.fillStyle = "#000"; ctx.fillRect(bx, by, bw, 14);
    ctx.fillStyle = boss.stage === 1 ? NEON.purple : NEON.pink;
    ctx.fillRect(bx, by, bw * Math.max(0, boss.hp/boss.maxHp), 14);
    ctx.strokeStyle = "#fff"; ctx.strokeRect(bx, by, bw, 14);
    ctx.fillStyle = "#fff"; ctx.font = "12px " + FONT; ctx.textAlign = "center";
    ctx.fillText(boss.stage === 1 ? "MISHA" : "MISHA — FINAL", cameraX + W/2, by - 4);
    ctx.textAlign = "left";
}

// Player: Luigi-style guy, no mustache, casual clothes
function drawPlayer() {
    const p = player, x = p.x, y = p.y, w = p.w, h = p.h, flip = p.facing === -1;
    ctx.save();
    if (p.hurtCd > 0 && Math.floor(p.hurtCd/3)%2 === 0) ctx.globalAlpha = 0.4;
    // legs: normal = two legs; kicking = ONE standing leg (the other is drawn kicking below)
    if (p.isKicking) {
        const backX = flip ? x + w - 15 : x + 3;   // standing leg on the back side
        ctx.fillStyle = "#2a4bd8"; ctx.fillRect(backX, y + 48, 12, h - 58);
        ctx.fillStyle = "#111";   ctx.fillRect(backX, y + h - 10, 12, 10);
    } else {
        ctx.fillStyle = "#2a4bd8"; ctx.fillRect(x + 3, y + 48, w - 6, h - 58);
        ctx.fillStyle = "#1f3aa8"; ctx.fillRect(x + w/2 - 1, y + 52, 2, h - 62);
        ctx.fillStyle = "#111";
        ctx.fillRect(x, y + h - 10, w/2 - 2, 10);
        ctx.fillRect(x + w/2 + 2, y + h - 10, w/2 - 2, 10);
    }
    // light t-shirt + arms
    ctx.fillStyle = "#f2efe4";
    ctx.fillRect(x + 2, y + 26, w - 4, 24);
    ctx.fillRect(x - 4, y + 28, 6, 18); ctx.fillRect(x + w - 2, y + 28, 6, 18);
    // hands (light skin)
    ctx.fillStyle = "#f0c39c";
    ctx.fillRect(x - 4, y + 44, 6, 5); ctx.fillRect(x + w - 2, y + 44, 6, 5);
    // face (light skin)
    ctx.fillRect(x + 6, y + 10, w - 12, 18);
    // dark hair
    ctx.fillStyle = "#3a2a1a";
    ctx.fillRect(x + 4, y + 2, w - 8, 9);
    ctx.fillRect(x + 4, y + 10, 4, 7); ctx.fillRect(x + w - 8, y + 10, 4, 7);
    // eyes
    ctx.fillStyle = "#111";
    const ex = flip ? x + 9 : x + w - 17;
    ctx.fillRect(ex, y + 16, 4, 4); ctx.fillRect(ex + (flip ? 8 : -8), y + 16, 4, 4);
    // kicking leg: extended forward horizontally from the hip, boot at the end
    if (p.isKicking) {
        const legY = y + 54;
        const kx = flip ? x - 22 : x + w - 4;
        ctx.fillStyle = "#2a4bd8"; ctx.fillRect(kx, legY, 24, 12);
        ctx.fillStyle = "#111"; ctx.fillRect(flip ? kx - 7 : kx + 24, legY, 7, 12);
    }
    ctx.restore();
}

function drawPopup(p) {
    ctx.globalAlpha = Math.min(1, p.life/25);
    ctx.fillStyle = p.color;
    ctx.font = "bold 18px " + FONT; ctx.textAlign = "center";
    ctx.fillText(p.text, p.x, p.y);
    ctx.textAlign = "left"; ctx.globalAlpha = 1;
}

// ================= HUD =================
function drawHUD() {
    // HP bar
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(14, 14, 204, 22);
    ctx.fillStyle = "#c00"; ctx.fillRect(16, 16, 200, 18);
    ctx.fillStyle = NEON.green; ctx.fillRect(16, 16, 200 * (player.hp/player.maxHp), 18);
    ctx.strokeStyle = "#fff"; ctx.strokeRect(16, 16, 200, 18);
    ctx.fillStyle = "#fff"; ctx.font = "bold 13px " + FONT;
    ctx.fillText("HP " + Math.ceil(player.hp), 22, 30);

    // Counters: ammo (bones, potions) + food (burgers, apples)
    let ix = 240;
    const row = [["🦴", player.ammo.bone], ["🧪", player.ammo.potion], ["🍔", player.inv.burger], ["🍎", player.inv.apple]];
    ctx.font = "18px " + FONT;
    for (const [icon, n] of row) {
        ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(ix, 14, 56, 26);
        ctx.fillText(icon, ix + 4, 33);
        ctx.fillStyle = "#fff"; ctx.font = "bold 14px " + FONT; ctx.fillText("x" + n, ix + 28, 32); ctx.font = "18px " + FONT;
        ix += 64;
    }

    // Location tag
    const names = { city: "CITY", forest: "FOREST", lab: "LAB", cave: "CAVE" };
    ctx.fillStyle = NEON.cyan; ctx.font = "bold 16px " + FONT; ctx.textAlign = "right";
    ctx.fillText(names[zoneAt(player.x)] || "", W - 16, 30); ctx.textAlign = "left";
}

function neonText(text, x, y, size, color) {
    ctx.font = "bold " + size + "px " + FONT;
    ctx.shadowColor = color; ctx.shadowBlur = 14;
    ctx.fillStyle = color; ctx.fillText(text, x, y);
    ctx.shadowBlur = 0;
}

function drawStart() {
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    neonText("DARK ENERGY", W/2, 78, 46, NEON.purple);
    ctx.fillStyle = "#fff"; ctx.font = "13px " + FONT;
    ctx.fillText("Fight through CITY - FOREST - LAB - CAVE to the source of evil.", W/2, 108);

    // Control legend (icon + what it does)
    ctx.textAlign = "left";
    const lx = W/2 - 190, top = 150, step = 40;
    const legend = [
        ["➡️ ⬅️", "MOVE", "(D / A)"],
        ["🦵",     "KICK", "(SPACE)"],
        ["🦴",     "THROW BONE / POTION", "(F)"],
        ["🍔",     "EAT — HEAL", "(E)"]
    ];
    ctx.font = "22px " + FONT;
    legend.forEach((row, i) => {
        const y = top + i*step;
        ctx.textAlign = "left";
        ctx.fillStyle = "#fff"; ctx.fillText(row[0], lx, y);
        ctx.fillStyle = NEON.green; ctx.font = "bold 18px " + FONT; ctx.fillText(row[1], lx + 90, y);
        ctx.fillStyle = "#8ad"; ctx.font = "14px " + FONT; ctx.fillText(row[2], lx + 300, y);
        ctx.font = "22px " + FONT;
    });

    ctx.textAlign = "center";
    if (Math.floor(tick/30) % 2 === 0) neonText("TAP / PRESS TO START", W/2, 400, 24, NEON.yellow);
    ctx.textAlign = "left";
}

function drawEnd(text, color) {
    ctx.fillStyle = "rgba(0,0,0,0.68)"; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    neonText(text, W/2, H/2 - 6, 58, color);
    ctx.fillStyle = "#fff"; ctx.font = "18px " + FONT;
    ctx.fillText("TAP / PRESS TO PLAY AGAIN", W/2, H/2 + 40);
    ctx.textAlign = "left";
}

// ================= LOOP =================
function loop() { update(); draw(); tick += (gameState === "start" ? 1 : 0); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
